# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Fortanix Secret Management
  displayName: 'Fortanix Secret Management extension task'
- task: Fortanix-Secret-Management@1
  inputs:
    FORTANIX_API_ENDPOINT: '$(FORTANIX_API_ENDPOINT)'
    FORTANIX_API_KEY: '$(FORTANIX_API_KEY)'
    FORTANIX_SECURITY_OBJECT_NAME: 'ADO-SECRET'
    FORTANIX_SECURITY_OBJECT: 'FORTANIX_SECURITY_OBJECT'
